services:
  frontend:
    build: ./platform/frontend
    container_name: cyvalidator-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - cyvalidator-net

  api-gateway:
    build: ./platform/api-gateway
    container_name: cyvalidator-api-gateway
    ports:
      - "8080:8080"
    environment:
      ENVIRONMENT: development
      AUTH_SERVICE_URL: http://auth-service:8081
      ASSET_SERVICE_URL: http://asset-service:8082
      FINDINGS_SERVICE_URL: http://findings-service:8083
      RISK_ENGINE_URL: http://risk-engine:8084
      BASELINE_ENGINE_URL: http://baseline-engine:8085
      ATTACK_GRAPH_ENGINE_URL: http://attack-graph-engine:8086
    depends_on:
      - auth-service
      - asset-service
      - findings-service
      - risk-engine
      - baseline-engine
      - attack-graph-engine
    networks:
      - cyvalidator-net

  auth-service:
    build: ./platform/auth-service
    container_name: cyvalidator-auth-service
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgresql+psycopg2://cyvalidator:cyvalidator@postgres:5432/cyvalidator
      JWT_SECRET: change_me_in_production
    depends_on:
      - postgres
    networks:
      - cyvalidator-net

  asset-service:
    build: ./platform/asset-service
    container_name: cyvalidator-asset-service
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgresql+psycopg2://cyvalidator:cyvalidator@postgres:5432/cyvalidator
      JWT_SECRET: change_me_in_production
    depends_on:
      - postgres
      - auth-service
    networks:
      - cyvalidator-net

  findings-service:
    build: ./platform/findings-service
    container_name: cyvalidator-findings-service
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: postgresql+psycopg2://cyvalidator:cyvalidator@postgres:5432/cyvalidator
      JWT_SECRET: change_me_in_production
    depends_on:
      - postgres
      - auth-service
      - asset-service
    networks:
      - cyvalidator-net

  risk-engine:
    build: ./platform/risk-engine
    container_name: cyvalidator-risk-engine
    ports:
      - "8084:8084"
    environment:
      DATABASE_URL: postgresql+psycopg2://cyvalidator:cyvalidator@postgres:5432/cyvalidator
      JWT_SECRET: change_me_in_production
    depends_on:
      - postgres
      - auth-service
      - asset-service
      - findings-service
    networks:
      - cyvalidator-net

  baseline-engine:
    build: ./platform/baseline-engine
    container_name: cyvalidator-baseline-engine
    ports:
      - "8085:8085"
    environment:
      DATABASE_URL: postgresql+psycopg2://cyvalidator:cyvalidator@postgres:5432/cyvalidator
      JWT_SECRET: change_me_in_production
    depends_on:
      - postgres
      - auth-service
      - asset-service
      - findings-service
    networks:
      - cyvalidator-net

  attack-graph-engine:
    build: ./platform/attack-graph-engine
    container_name: cyvalidator-attack-graph-engine
    ports:
      - "8086:8086"
    environment:
      DATABASE_URL: postgresql+psycopg2://cyvalidator:cyvalidator@postgres:5432/cyvalidator
      JWT_SECRET: change_me_in_production
    depends_on:
      - postgres
      - auth-service
      - asset-service
      - findings-service
      - baseline-engine
    networks:
      - cyvalidator-net

  postgres:
    image: postgres:16
    container_name: cyvalidator-postgres
    environment:
      POSTGRES_USER: cyvalidator
      POSTGRES_PASSWORD: cyvalidator
      POSTGRES_DB: cyvalidator
    ports:
      - "5432:5432"
    volumes:
      - cyvalidator_postgres_data:/var/lib/postgresql/data
    networks:
      - cyvalidator-net

  redis:
    image: redis:7
    container_name: cyvalidator-redis
    ports:
      - "6379:6379"
    networks:
      - cyvalidator-net

networks:
  cyvalidator-net:
    driver: bridge

volumes:
  cyvalidator_postgres_data: